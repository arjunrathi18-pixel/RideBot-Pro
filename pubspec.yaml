name: ridebot_pro

description: Advanced Ride Automation Assistant

publish_to: "none"

version: 1.0.0+1


environment:
  sdk: ">=3.4.0 <4.0.0"


dependencies:

  flutter:
    sdk: flutter


  # State Management
  provider: ^6.1.2


  # Local Database
  hive: ^2.2.3
  hive_flutter: ^1.1.0


  # Permissions
  permission_handler: ^11.3.1


  # Notifications
  flutter_local_notifications: ^17.2.3


  # Device info
  device_info_plus: ^10.1.0


  # App settings storage
  shared_preferences: ^2.3.2


  # Location support
  geolocator: ^13.0.1


  # UI Icons
  cupertino_icons: ^1.0.8



dev_dependencies:

  flutter_test:
    sdk: flutter


  flutter_lints: ^5.0.0


  build_runner: ^2.4.12


  hive_generator: ^2.0.1



flutter:

  uses-material-design: true
